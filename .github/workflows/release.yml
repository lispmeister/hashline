name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: hashline-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            name: hashline-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: hashline-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: hashline-aarch64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: hashline-x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate man page (unix)
        if: runner.os != 'Windows'
        run: cargo run --bin mangen

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/hashline hashline
          tar czf ${{ matrix.name }}.tar.gz hashline man/hashline*.1
          rm hashline
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/hashline.exe -DestinationPath ${{ matrix.name }}.zip
          (Get-FileHash ${{ matrix.name }}.zip -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.name }}.zip" | Out-File -Encoding ASCII ${{ matrix.name }}.zip.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
            ${{ matrix.name }}.zip
            ${{ matrix.name }}.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 checksums
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            gh release download "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "hashline-${target}.tar.gz.sha256" \
              --output "hashline-${target}.sha256"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_AARCH64_MACOS=$(awk '{print $1}' hashline-aarch64-apple-darwin.sha256)
          SHA_X86_64_MACOS=$(awk '{print $1}' hashline-x86_64-apple-darwin.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' hashline-aarch64-unknown-linux-gnu.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' hashline-x86_64-unknown-linux-gnu.sha256)

          cat > formula.rb <<FORMULA
          class Hashline < Formula
            desc "Content-addressable line editing tool for AI coding assistants"
            homepage "https://github.com/lispmeister/hashline"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/lispmeister/hashline/releases/download/v#{version}/hashline-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_MACOS}"
              end
              on_intel do
                url "https://github.com/lispmeister/hashline/releases/download/v#{version}/hashline-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MACOS}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/lispmeister/hashline/releases/download/v#{version}/hashline-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              end
              on_intel do
                url "https://github.com/lispmeister/hashline/releases/download/v#{version}/hashline-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "hashline"
              man1.install Dir["man/*.1"]
            end

            def caveats
              <<~EOS
                To use hashline with Claude Code, install the skill (one-time):

                  mkdir -p ~/.claude/skills/hashline-setup
                  curl -fsSL https://raw.githubusercontent.com/lispmeister/hashline/main/contrib/skills/hashline-setup/SKILL.md \\\\
                      -o ~/.claude/skills/hashline-setup/SKILL.md

                Then run /hashline-setup in any project to activate the hooks.

                For other agents (Cursor, Windsurf, etc.), see:
                  https://github.com/lispmeister/hashline#agent-integration
              EOS
            end

            test do
              (testpath/"test.txt").write("hello world\\n")
              output = shell_output("#{bin}/hashline read #{testpath}/test.txt")
              assert_match "1:", output
              assert_match "hello world", output
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' formula.rb

          # Push to tap repo via GitHub API
          EXISTING_SHA=$(gh api repos/lispmeister/homebrew-hashline/contents/Formula/hashline.rb --jq '.sha')
          gh api repos/lispmeister/homebrew-hashline/contents/Formula/hashline.rb \
            --method PUT \
            --field message="hashline ${VERSION}" \
            --field content="$(base64 -w0 formula.rb)" \
            --field sha="$EXISTING_SHA"
        env:
          GH_TOKEN: ${{ secrets.BREW_TAP_TOKEN }}
